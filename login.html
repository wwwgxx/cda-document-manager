<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享文档管理系统 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'Digital';
            src: local('Consolas'), local('Courier New');
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Animated Background ===== */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0,210,190,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,210,190,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        .bg-glow-1 {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,210,190,0.12) 0%, transparent 70%);
            top: -150px; right: -100px;
            z-index: 1;
            animation: float1 8s ease-in-out infinite;
        }

        .bg-glow-2 {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,100,255,0.08) 0%, transparent 70%);
            bottom: -200px; left: -150px;
            z-index: 1;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 20px) scale(1.1); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -30px) scale(1.05); }
        }

        /* ===== Scan Line ===== */
        .scan-line {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,210,190,0.6), transparent);
            z-index: 2;
            animation: scanDown 4s linear infinite;
        }

        @keyframes scanDown {
            0% { top: -2px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* ===== Floating Particles ===== */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(0,210,190,0.6);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== Corner Decorations ===== */
        .corner-deco {
            position: fixed;
            width: 80px; height: 80px;
            z-index: 3;
            pointer-events: none;
        }

        .corner-deco.tl { top: 20px; left: 20px; border-top: 2px solid rgba(0,210,190,0.4); border-left: 2px solid rgba(0,210,190,0.4); }
        .corner-deco.tr { top: 20px; right: 20px; border-top: 2px solid rgba(0,210,190,0.4); border-right: 2px solid rgba(0,210,190,0.4); }
        .corner-deco.bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(0,210,190,0.4); border-left: 2px solid rgba(0,210,190,0.4); }
        .corner-deco.br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(0,210,190,0.4); border-right: 2px solid rgba(0,210,190,0.4); }

        /* ===== Login Container ===== */
        .login-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ===== Top Status Bar ===== */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 12px;
            color: rgba(0,210,190,0.6);
            font-family: 'Consolas', 'Courier New', monospace;
            margin-bottom: 8px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00d2be;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(0,210,190,0.6); }
            50% { opacity: 0.5; box-shadow: 0 0 8px rgba(0,210,190,0.8); }
        }

        /* ===== Logo Area ===== */
        .login-logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            position: relative;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 12px rgba(0,210,190,0.5));
        }

        .logo-ring {
            position: absolute;
            top: -4px; left: -4px;
            width: 80px; height: 80px;
            border: 1px solid rgba(0,210,190,0.3);
            border-radius: 50%;
            animation: ringRotate 12s linear infinite;
        }

        .logo-ring::after {
            content: '';
            position: absolute;
            top: -2px; left: 50%;
            width: 4px; height: 4px;
            background: #00d2be;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px #00d2be;
        }

        @keyframes ringRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-title {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0,210,190,0.4);
        }

        .login-subtitle {
            font-size: 13px;
            color: rgba(0,210,190,0.6);
            margin-top: 8px;
            letter-spacing: 2px;
            font-family: 'Consolas', monospace;
        }

        /* ===== Login Card ===== */
        .login-card {
            width: 420px;
            background: rgba(10,14,39,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0,210,190,0.15);
            border-radius: 12px;
            padding: 36px 40px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(0,210,190,0.05),
                inset 0 1px 0 rgba(0,210,190,0.1);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 200%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,210,190,0.6), transparent);
            animation: cardScan 3s linear infinite;
        }

        @keyframes cardScan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* ===== Tab Toggle ===== */
        .login-tabs {
            display: flex;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(0,210,190,0.1);
        }

        .login-tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        .login-tab.active {
            color: #00d2be;
            border-bottom-color: #00d2be;
            text-shadow: 0 0 12px rgba(0,210,190,0.5);
        }

        .login-tab:hover:not(.active) {
            color: rgba(255,255,255,0.7);
        }

        /* ===== Form Fields ===== */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: rgba(0,210,190,0.7);
            margin-bottom: 8px;
            font-family: 'Consolas', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-input-wrap {
            position: relative;
        }

        .form-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0,210,190,0.4);
            z-index: 2;
            display: flex;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            height: 46px;
            background: rgba(0,210,190,0.03);
            border: 1px solid rgba(0,210,190,0.15);
            border-radius: 6px;
            padding: 0 16px 0 44px;
            font-size: 14px;
            color: #e0e6ed;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .form-input:focus {
            border-color: rgba(0,210,190,0.5);
            background: rgba(0,210,190,0.05);
            box-shadow: 0 0 16px rgba(0,210,190,0.08);
        }

        .form-input:focus + .form-icon,
        .form-input:focus ~ .form-icon {
            color: #00d2be;
        }

        .form-group:focus-within .form-icon {
            color: #00d2be;
        }

        /* ===== Captcha ===== */
        .captcha-row {
            display: flex;
            gap: 12px;
        }

        .captcha-row .form-input {
            flex: 1;
        }

        .captcha-img {
            width: 130px;
            height: 46px;
            background: rgba(0,210,190,0.08);
            border: 1px solid rgba(0,210,190,0.15);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            transition: border-color 0.3s;
        }

        .captcha-img:hover {
            border-color: rgba(0,210,190,0.4);
        }

        .captcha-canvas {
            width: 100%;
            height: 100%;
        }

        /* ===== Login Button ===== */
        .login-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, rgba(0,210,190,0.9) 0%, rgba(0,180,170,0.9) 100%);
            border: none;
            border-radius: 6px;
            color: #0a0e27;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            box-shadow: 0 0 24px rgba(0,210,190,0.4);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            animation: btnShine 3s linear infinite;
        }

        @keyframes btnShine {
            0% { left: -60%; }
            100% { left: 120%; }
        }

        /* ===== Remember & Forgot ===== */
        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(0,210,190,0.3);
            border-radius: 3px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .remember-me input[type="checkbox"]:checked {
            background: #00d2be;
            border-color: #00d2be;
        }

        .remember-me input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px; top: 1px;
            width: 5px; height: 9px;
            border: solid #0a0e27;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .forgot-link {
            color: rgba(0,210,190,0.6);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #00d2be;
            text-shadow: 0 0 8px rgba(0,210,190,0.4);
        }

        /* ===== Error Message ===== */
        .error-msg {
            background: rgba(255,60,60,0.08);
            border: 1px solid rgba(255,60,60,0.2);
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #ff6b6b;
            display: none;
            animation: shakeX 0.4s ease;
        }

        .error-msg.show { display: block; }

        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ===== Footer ===== */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            font-family: 'Consolas', monospace;
        }

        .login-footer a {
            color: rgba(0,210,190,0.4);
            text-decoration: none;
        }

        /* ===== Loading Animation ===== */
        .login-btn.loading {
            pointer-events: none;
            background: rgba(0,210,190,0.3);
        }

        .login-btn.loading .btn-text {
            opacity: 0;
        }

        .login-btn .btn-loading {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .login-btn.loading .btn-loading {
            display: block;
        }

        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(10,14,39,0.3);
            border-top-color: #0a0e27;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Hex decoration ===== */
        .hex-line {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 2;
            pointer-events: none;
        }

        .hex-dot {
            width: 4px; height: 4px;
            background: rgba(0,210,190,0.2);
            transform: rotate(45deg);
            animation: hexPulse 3s ease-in-out infinite;
        }

        .hex-dot:nth-child(2) { animation-delay: 0.3s; }
        .hex-dot:nth-child(3) { animation-delay: 0.6s; }
        .hex-dot:nth-child(4) { animation-delay: 0.9s; }
        .hex-dot:nth-child(5) { animation-delay: 1.2s; }

        @keyframes hexPulse {
            0%, 100% { opacity: 0.2; transform: rotate(45deg) scale(1); }
            50% { opacity: 0.8; transform: rotate(45deg) scale(1.5); background: #00d2be; }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="scan-line"></div>
    <div class="particles" id="particles"></div>

    <!-- Corner Decorations -->
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <!-- Login Wrapper -->
    <div class="login-wrapper">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item"><div class="status-dot"></div><span>系统在线</span></div>
            <div class="status-item">SECURE CONNECTION</div>
            <div class="status-item" id="currentTime"></div>
        </div>

        <!-- Logo -->
        <div class="login-logo">
            <div class="logo-icon">
                <div class="logo-ring"></div>
                <svg viewBox="0 0 72 72">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00d2be"/>
                            <stop offset="100%" style="stop-color:#00a89d"/>
                        </linearGradient>
                    </defs>
                    <circle cx="36" cy="36" r="30" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/>
                    <circle cx="36" cy="36" r="20" fill="none" stroke="url(#logoGrad)" stroke-width="1" opacity="0.3"/>
                    <path d="M36 12 L36 60 M12 36 L60 36" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="36" cy="36" r="10" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.6"/>
                    <circle cx="36" cy="36" r="3" fill="url(#logoGrad)" opacity="0.8"/>
                </svg>
            </div>
            <div class="login-title">共享文档管理系统</div>
            <div class="login-subtitle">CDA Document Management Platform v3.2</div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Tabs -->
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('account')">账号登录</div>
                <div class="login-tab" onclick="switchTab('card')">CA证书登录</div>
            </div>

            <!-- Error -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- Account Login -->
            <div id="tabAccount">
                <div class="form-group">
                    <label class="form-label">// 用户账号</label>
                    <div class="form-input-wrap">
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名或工号" autocomplete="off">
                        <span class="form-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">// 登录密码</label>
                    <div class="form-input-wrap">
                        <input type="password" class="form-input" id="password" placeholder="请输入密码">
                        <span class="form-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">// 验证码</label>
                    <div class="captcha-row">
                        <div class="form-input-wrap" style="flex:1">
                            <input type="text" class="form-input" id="captcha" placeholder="请输入验证码" maxlength="4" style="padding-left:16px">
                        </div>
                        <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()" title="点击刷新">
                            <canvas id="captchaCanvas" class="captcha-canvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CA Cert Login (hidden by default) -->
            <div id="tabCard" style="display:none">
                <div class="form-group">
                    <label class="form-label">// CA证书</label>
                    <div class="form-input-wrap">
                        <select class="form-input" style="padding-left:16px;background:rgba(0,210,190,0.03)">
                            <option value="">请选择CA证书</option>
                            <option value="cert1">信息科-王明 (有效期至 2025-12-31)</option>
                            <option value="cert2">管理员-系统 (有效期至 2026-06-30)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">// PIN码</label>
                    <div class="form-input-wrap">
                        <input type="password" class="form-input" placeholder="请输入CA证书PIN码">
                        <span class="form-icon">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Login Button -->
            <button class="login-btn" id="loginBtn" onclick="handleLogin()">
                <span class="btn-text">系 统 登 录</span>
                <span class="btn-loading"><div class="spinner"></div></span>
            </button>

            <!-- Options -->
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" checked> 记住登录状态
                </label>
                <a class="forgot-link">忘记密码?</a>
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <div>Powered by CDA Document Engine | HL7 CDA R2 Compliant</div>
        </div>

        <!-- Hex Decoration -->
        <div class="hex-line">
            <div class="hex-dot"></div>
            <div class="hex-dot"></div>
            <div class="hex-dot"></div>
            <div class="hex-dot"></div>
            <div class="hex-dot"></div>
        </div>
    </div>

    <script>
        // ===== Particles =====
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (6 + Math.random() * 8) + 's';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.width = (1 + Math.random() * 2) + 'px';
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        }
        createParticles();

        // ===== Clock =====
        function updateClock() {
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('currentTime').textContent =
                now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' +
                pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ===== Captcha =====
        let captchaText = '';

        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            let text = '';
            for (let i = 0; i < 4; i++) text += chars[Math.floor(Math.random() * chars.length)];
            return text;
        }

        function drawCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 130;
            canvas.height = 46;

            // Background
            ctx.fillStyle = 'rgba(0,210,190,0.05)';
            ctx.fillRect(0, 0, 130, 46);

            // Noise lines
            for (let i = 0; i < 4; i++) {
                ctx.strokeStyle = `rgba(0,210,190,${0.1 + Math.random()*0.2})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(Math.random()*130, Math.random()*46);
                ctx.lineTo(Math.random()*130, Math.random()*46);
                ctx.stroke();
            }

            // Dots
            for (let i = 0; i < 20; i++) {
                ctx.fillStyle = `rgba(0,210,190,${0.2 + Math.random()*0.3})`;
                ctx.beginPath();
                ctx.arc(Math.random()*130, Math.random()*46, 1, 0, Math.PI*2);
                ctx.fill();
            }

            // Text
            captchaText = generateCaptcha();
            const colors = ['#00d2be', '#00e5ff', '#4dd0e1', '#26c6da', '#80deea'];
            for (let i = 0; i < 4; i++) {
                ctx.font = (18 + Math.random()*4) + 'px Consolas, monospace';
                ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
                ctx.save();
                ctx.translate(22 + i * 26, 30);
                ctx.rotate((Math.random()-0.5) * 0.4);
                ctx.fillText(captchaText[i], 0, 0);
                ctx.restore();
            }
        }

        function refreshCaptcha() {
            drawCaptcha();
            document.getElementById('captcha').value = '';
        }

        drawCaptcha();

        // ===== Tab Switch =====
        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            if (tab === 'account') {
                document.querySelector('.login-tab:nth-child(1)').classList.add('active');
                document.getElementById('tabAccount').style.display = 'block';
                document.getElementById('tabCard').style.display = 'none';
            } else {
                document.querySelector('.login-tab:nth-child(2)').classList.add('active');
                document.getElementById('tabAccount').style.display = 'none';
                document.getElementById('tabCard').style.display = 'block';
            }
        }

        // ===== Login =====
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaVal = document.getElementById('captcha').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!username) {
                errorEl.textContent = '请输入用户名';
                errorEl.className = 'error-msg show';
                return;
            }
            if (!password) {
                errorEl.textContent = '请输入密码';
                errorEl.className = 'error-msg show';
                return;
            }
            if (!captchaVal) {
                errorEl.textContent = '请输入验证码';
                errorEl.className = 'error-msg show';
                return;
            }
            if (captchaVal.toLowerCase() !== captchaText.toLowerCase()) {
                errorEl.textContent = '验证码错误，请重新输入';
                errorEl.className = 'error-msg show';
                refreshCaptcha();
                return;
            }

            errorEl.className = 'error-msg';

            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');

            // Simulate login
            setTimeout(() => {
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('loginUser', username);
                window.location.href = 'index.html';
            }, 1500);
        }

        // Enter key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
